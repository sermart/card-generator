<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор карточек</title>
<link rel="icon" type="png" href="favicon.png">

<meta name="description" content="Создавайте профессиональные карточки с физическими и математическими формулами онлайн. Удобный ввод и экспорт в PNG.">
<meta name="author" content="Генератор карточек">

<meta property="og:title" content="Генератор карточек — Онлайн сборка формул">
<meta property="og:description" content="Сервис для визуализации формул с проверкой синтаксиса. Создавай учебные материалы в один клик.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sermart.github.io/card-generator/">
<meta property="og:image" content="https://sermart.github.io/card-generator/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Генератор карточек">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Генератор карточек — Онлайн сборка формул">
<meta name="twitter:description" content="Удобный конструктор для перевода текстовых формул в красивые изображения.">
<meta name="twitter:image" content="https://sermart.github.io/card-generator/preview.png">

<meta property="telegram:title" content="Генератор карточек — Сборка формул">
<meta property="telegram:description" content="Вводите данные и получайте готовые карточки с формулами.">
<meta property="telegram:image" content="https://sermart.github.io/card-generator/preview.png">

<meta property="vk:image" content="https://sermart.github.io/card-generator/preview.png">

<meta property="og:image:type" content="image/png">
<meta property="og:image:alt" content="Генератор карточек — скриншот интерфейса">

<meta name="theme-color" content="#1a1f2e">
<meta name="apple-mobile-web-app-title" content="Генератор карточек">
<meta name="mobile-web-app-capable" content="yes">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="panel">
        <div class="panel-header">
            <img src="favicon.png" alt="Logo" class="panel-logo">
            
            <div class="header-text">
                <h1>Генератор карточек</h1>
                <p class="panel-subtitle">Создайте карточку с формулами</p>
            </div>
        </div>

        <div class="input-group">
            <label>Дано</label>
            <textarea id="givenInput" placeholder="m = 1420 кг&#10;S_o = 900 см**2&#10;g = 10 H/кг"></textarea>
        </div>

        <div class="input-group">
            <label>Найти</label>
            <textarea id="findInput" placeholder="p = ?"></textarea>
        </div>

        <div class="buttons">
            <button id="downloadBtn" class="primary">Скачать PNG</button>
            <button id="clearBtn">Очистить</button>
        </div>

        <div class="hint">
            <div class="hint-title">Подсказки ввода формул</div>
            
            <div class="hint-grid">
                <div class="hint-card">
                    <div class="hint-symbol">d</div>
                    <div class="hint-meaning">Дельта (Δ)</div>
                    <div class="hint-example">dE → ΔE</div>
                </div>

                <div class="hint-card">
                    <div class="hint-symbol">g</div>
                    <div class="hint-meaning">Градусы (°)</div>
                    <div class="hint-example">90g → 90°</div>
                </div>

                <div class="hint-card">
                    <div class="hint-symbol">_</div>
                    <div class="hint-meaning">Нижний индекс</div>
                    <div class="hint-example">v_0 → v₀</div>
                </div>

                <div class="hint-card">
                    <div class="hint-symbol">**</div>
                    <div class="hint-meaning">Степень</div>
                    <div class="hint-example">x**2 → x²</div>
                </div>
            </div>

            <div class="hint-card-wide">
                <div class="hint-symbol-wide">s()</div>
                <div class="hint-meaning-wide">Квадратный корень</div>
                <div class="hint-example-wide">s(9) → √9</div>
            </div>
        </div>
    </div>

    <div class="preview">
        <div class="card" id="card">
            <div class="left">
                <div class="block">
                    <div class="title">Дано</div>
                    <div id="givenOutput" class="output-content"></div>
                </div>
                <div class="block bottom">
                    <div class="title">Найти</div>
                    <div id="findOutput" class="output-content"></div>
                </div>
            </div>
            <div class="right">
                <div class="title">Решение</div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
